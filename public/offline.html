<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline — Diploma Dost</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d0e0f;
      color: #f0ede6;
      font-family: 'General Sans', system-ui, -apple-system, sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }
    .label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #e8453c;
      font-weight: 700;
      margin-bottom: 1.25rem;
    }
    h1 {
      font-size: clamp(1.75rem, 5vw, 2.75rem);
      font-weight: 600;
      line-height: 1.15;
      margin-bottom: 1rem;
      letter-spacing: -0.01em;
    }
    p {
      font-size: 0.95rem;
      color: #888;
      max-width: 380px;
      line-height: 1.65;
      margin-bottom: 2rem;
    }
    button {
      padding: 0.65rem 1.5rem;
      border-radius: 0.5rem;
      border: 1px solid #2a2a2a;
      background: #141414;
      color: #f0ede6;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    button:hover { border-color: rgba(232,69,60,0.5); color: #e8453c; }
  </style>
</head>
<body>
  <p class="label">No connection</p>
  <h1>You're offline</h1>
  <p>Diploma Dost needs an internet connection. Check your network and try again.</p>
  <button onclick="window.location.reload()">Try again</button>
</body>
</html>
